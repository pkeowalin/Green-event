<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Event Quiz & Simulator 🌍</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (Production CDNs) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone CDN for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Font: Anuphan -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ตั้งค่าฟอนต์หลักและสไตล์แอนิเมชันสำหรับใช้งานบนเบราว์เซอร์ */
    body {
      font-family: 'Anuphan', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: rgb(244, 249, 245);
      overflow-x: hidden;
    }
    
    /* Custom Keyframe Animations for smooth HTML transitions */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes rotateGlobe {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes leafFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.3; }
      50% { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    .animate-slide-in {
      animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-rotate-globe {
      animation: rotateGlobe 30s linear infinite;
    }
    .animate-leaf {
      animation: leafFall 12s linear infinite;
    }
  </style>

  <script>
    // กำหนดโครงร่างธีม Tailwind เพิ่มเติมผ่าน JavaScript config
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#15803d', // emerald-700
              hover: '#166534',
            },
            accent: '#f0fdf4', // emerald-50
          }
        }
      }
    }
  </script>
</head>

    const SvgActivity = ({ className = "w-4 h-4" }) => (

    // ==========================================
    // DATA DECLARATION
    // ==========================================
    const organizerQuestions = [
      {
        id: "o1",

        emoji: "🍱",
        question: "การเลือกจัดเลี้ยงอาหารและเครื่องดื่มในงานอีเวนต์",
        options: [
          { emoji: "🌱", text: "อาหารมังสวิรัติ/วีแกนทั้งหมดจากวัตถุดิท้องถิ่น", co2: 12.5 },
          { emoji: "🥗", text: "อาหารทั่วไปแต่เพิ่มสัดส่วนผัก พร้อมป้ายระบุคาร์บอนฟุตพริ้นท์", co2: 6.0 },
          { emoji: "🥩", text: "อาหารบุฟเฟต์ทั่วไป ไม่มีการคัดสรรแหล่งวัตถุดิบเป็นพิเศษ", co2: 0.0 }
        ]
      },
      {

        emoji: "🪵",
        question: "อุปกรณ์ตกแต่งสถานที่และของที่ระลึกภายในงาน",
        options: [
          { emoji: "♻️", text: "ใช้วัสดุธรรมชาติ/รีไซเคิล 100% หรือของที่ระลึกในรูปแบบดิจิทัล", co2: 8.0 },
          { emoji: "🎨", text: "เน้นการเช่าอุปกรณ์ ตกแต่งแบบมินิมอลเพื่อลดขยะหลังจบงาน", co2: 4.5 },
          { emoji: "🎈", text: "สั่งผลิตฉากเวทีและของแจกพลาสติกชุดใหม่ทั้งหมดเพื่อธีมงาน", co2: 0.0 }

          { emoji: "💡", text: "ปรับระดับอุณหภูมิแอร์อย่างเหมาะสม (25-26°C) ร่วมกับใช้หลอดไฟ LED ทั้งหมด", co2: 7.0 },

      {

          { emoji: "🚇", text: "ติดแนวรถไฟฟ้า BTS/MRT หรือใช้ระบบการเข้างานแบบไฮบริดออนไลน์", co2: 14.0 },
          { emoji: "🏢", text: "สถานที่ใจกลางเมืองที่มีที่จอดรถจำกัด แต่เดินรถสาธารณะมาสะดวก", co2: 6.0 },
          { emoji: "🚗", text: "สถานที่แถบชานเมืองหรือรีสอร์ต เดินทางด้วยรถยนต์ส่วนตัวเท่านั้น", co2: 0.0 }
        ]
      }
    ];

    const attendeeQuestions = [
      {
        id: "a1",
        category: "การเดินทาง (Transportation)",
        emoji: "🚇",
        question: "วิธีการเดินทางหลักของคุณเพื่อมาร่วมงานในวันนี้",
        options: [
          { emoji: "🚲", text: "เดิน ปั่นจักรยาน หรือเดินทางด้วยระบบรถไฟฟ้า/รถสาธารณะ", co2: 10.0 },
          { emoji: "🚌", text: "โดยสารรถประจำทาง หรือคาร์พูลแชร์รถร่วมกับผู้ร่วมงานท่านอื่น", co2: 4.5 },
          { emoji: "🚗", text: "ขับรถยนต์ส่วนตัวเดินทางคนเดียวมาที่งาน", co2: 0.0 }
        ]
      },
      {
        id: "a2",
        category: "ขยะพลาสติกพกพา (Reusable Items)",

          { emoji: "🧴", text: "รับขวดน้ำพลาสติกแบบใช้ครั้งเดียวทิ้งที่ผู้จัดงานแจกให้", co2: 0.0 }
        ]
      },
      {
        id: "a3",
        category: "ขยะเศษอาหาร (Food Waste)",
        emoji: "🍛",
        question: "การรับประทานอาหารว่างและอาหารกลางวันของคุณภายในงาน",
        options: [
          { emoji: "🍽️", text: "รับประทานในปริมาณที่พอเหมาะ ทานหมดเกลี้ยง จานสะอาด 100%", co2: 7.0 },
          { emoji: "🥡", text: "ทานเหลือเล็กน้อยแต่คัดแยกเศษอาหารลงถังขยะเปียกเพื่อไปทำปุ๋ย", co2: 3.0 },
          { emoji: "🗑️", text: "ทานเหลือค่อนข้างมาก และทิ้งรวมลงถังขยะทั่วไปปนกับภาชนะอื่น", co2: 0.0 }
        ]
      },
      {
        id: "a4",
        category: "เอกสารและของรางวัล (Eco-Document & Swag)",
        emoji: "📄",

          { emoji: "📱", text: "ปฏิเสธเอกสารกระดาษทั้งหมด เลือกสแกนรับข้อมูลผ่าน QR Code", co2: 5.0 },
          { emoji: "🗒️", text: "รับเอกสารเฉพาะส่วนที่จำเป็นมากๆ และช่วยส่งคืนเพื่อนำมารีไซเคิล", co2: 2.0 },
          { emoji: "🛍️", text: "รับแผ่นพับสติกเกอร์ ถุงผ้า และของแจกฟรีทุกอย่างที่งานเตรียมไว้ให้", co2: 0.0 }

          { emoji: "👔", text: "สวมเสื้อผ้าที่มีอยู่แล้วในตู้ หรือชุดเสื้อผ้ารีไซเคิล/มือสองสไตล์มินิมอล", co2: 8.0 },

        ]

    const allQuestions = organizerQuestions.flatMap((q, i) =>
      attendeeQuestions[i] ? [q, attendeeQuestions[i]] : [q]

    const maxOrganizerCO2 = organizerQuestions.reduce((sum, q) => sum + Math.max(...q.options.map(o => o.co2)), 0);
    const maxAttendeeCO2 = attendeeQuestions.reduce((sum, q) => sum + Math.max(...q.options.map(o => o.co2)), 0);

    const getLevel = (totalCO2, maxCO2) => {
      const pct = totalCO2 / maxCO2;
      if (pct < 0.4) {
        return {
          label: "🌱 ต้นกล้าหัดรักษ์โลก (Green Novice)",
          color: "from-amber-400 to-emerald-500",
          bg: "bg-amber-50/90 border border-amber-100",
          textColor: "text-amber-800",

        return {
          label: "🌿 นักสู้ลดคาร์บอน (Carbon Fighter)",
          color: "from-emerald-400 to-teal-500",
          bg: "bg-emerald-50/80 border border-emerald-100",
          textColor: "text-emerald-800",
          desc: "ยอดเยี่ยมมาก! คุณช่วยเซฟโลกได้อย่างมีนัยสำคัญ มีแนวคิดเป็นมิตรต่อสิ่งแวดล้อมที่นำไปใช้ประโยชน์จริงได้"

          label: "🌳 ผู้พิทักษ์ธรรมชาติ (Eco Warrior)",
          color: "from-green-500 to-emerald-600",
          bg: "bg-green-50/90 border border-green-100",
          textColor: "text-green-800",
          desc: "ระดับตำนาน! ตัวจริงเรื่อง Green Event คุณทำคะแนนรักษ์โลกได้สูงมาก ช่วยเป็นแรงบันดาลใจให้คนรอบข้างต่อนะ!"
        };
      }
    };

    const getComparisons = (totalCO2) => {
      const treesDays = Math.round(totalCO2 / 0.03);
      const phoneCharges = Math.round(totalCO2 / 0.008);
      const carKm = Math.round(totalCO2 / 0.12);
      return [
        { emoji: "🌳", label: `ปลูกต้นไม้ใหญ่ช่วยดูดซับคาร์บอนเป็นเวลา ${treesDays} วัน`, sub: "เทียบเท่าผลลัพธ์ของป่าสีเขียวทำงานอย่างตั้งใจ" },
        { emoji: "📱", label: `ช่วยทดแทนการชาร์จสมาร์ตโฟนได้ถึง ${phoneCharges.toLocaleString()} ครั้ง`, sub: "พลังงานมหาศาลที่ถูกกู้คืนกลับมา" },
        { emoji: "🚗", label: `ลดระยะการขับขี่รถยนต์ส่วนตัวลงถึง ${carKm} กิโลเมตร`, sub: "ประหยัดเชื้อเพลิงและไอเสียบนท้องถนน" }
      ];
    };

    // ==========================================
    // SCREEN: HOME
    // ==========================================
    function HomeScreen({ onStart }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 text-center relative animate-fade-in">
          {/* Floating Leaves Background */}
          <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
            {["🍃", "🌿", "🌱", "☘️", "🍀", "🌾"].map((leaf, i) => (
              <div
                key={i}
                className="absolute text-3xl opacity-20 select-none animate-leaf"
                style={{
                  left: `${10 + i * 15}%`,
                  animationDelay: `${i * 1.5}s`,
                  animationDuration: `${10 + i * 2}s`
                }}
              >
                {leaf}
              </div>
            ))}
          </div>

          {/* Planet Earth Circle */}
          <div className="relative mb-8 z-10">
            <div className="w-32 h-32 rounded-full bg-gradient-to-br from-emerald-400 to-green-600 flex items-center justify-center shadow-2xl shadow-green-300/40">

            </div>
            <div className="absolute -inset-3 rounded-full border-2 border-dashed border-emerald-600/30 animate-rotate-globe" />

          <div className="z-10 max-w-xl">
            <h1 className="text-4xl md:text-5xl font-black bg-gradient-to-r from-emerald-600 via-green-500 to-teal-500 bg-clip-text text-transparent mb-2">
              Green Event Quiz
            </h1>

            <p className="text-lg md:text-xl font-bold text-slate-800 mb-4">
              วัดระดับ Green ของคุณในงาน Event 🌿
            </p>

            <p className="text-slate-500 max-w-md mx-auto mb-8 leading-relaxed text-sm md:text-base">
              ตอบคำถาม 10 ข้อ เกี่ยวกับการจัดงานและการเข้าร่วมงานอย่างยั่งยืน แล้วดูว่าคุณช่วยลดการปล่อยคาร์บอนไดออกไซด์ (CO₂) ได้มากน้อยแค่ไหนกันแน่!
            </p>
          </div>

          {/* Quick Stats Grid */}
          <div className="flex gap-6 mb-10 text-center z-10 bg-white/70 backdrop-blur-md px-6 py-4 rounded-2xl border border-green-100">
            {[
              { emoji: "❓", label: "10 คำถาม" },
              { emoji: "⏱️", label: "~2 นาที" },
              { emoji: "🌱", label: "คำนวณ CO₂ จริง" },
            ].map((s, i) => (
              <div key={i} className="flex flex-col items-center gap-1">
                <span className="text-2xl">{s.emoji}</span>
                <span className="text-xs text-slate-500 font-bold whitespace-nowrap">
                  {s.label}
                </span>
              </div>
            ))}
          </div>

          <div className="z-10">
            <button
              onClick={onStart}
              className="inline-flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-bold px-8 py-4 rounded-2xl shadow-lg shadow-green-600/25 transition-all duration-300 active:scale-95"
            >
              <SvgSparkles className="w-5 h-5 mr-1" />
              เริ่มทำแบบทดสอบ
            </button>
          </div>

          <div className="mt-10 flex items-center gap-2 text-xs text-slate-400 z-10">
            <span className="text-emerald-500">🍃</span>
            <span>ไม่มีต้นไม้ถูกทำร้ายในการทำแบบทดสอบนี้ 😄</span>
          </div>
        </div>
      );
    }

    // ==========================================
    // SCREEN: EVENT QUESTION CARD
    // ==========================================
    function EventQuestionCard({ question, questionIndex, totalQuestions, onAnswer }) {
      return (
        <div className="w-full max-w-xl mx-auto px-4 py-6 animate-slide-in">
          {/* Progress & Counter */}
          <div className="flex items-center justify-end mb-4">
            <span className="text-xs font-bold text-slate-400">
              คำถามที่ {questionIndex + 1} / {totalQuestions}
            </span>
          </div>

          {/* Progress Bar */}
          <div className="mb-8">
            <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-emerald-400 to-green-500 rounded-full transition-all duration-500 ease-out"
                style={{ width: `${((questionIndex + 1) / totalQuestions) * 100}%` }}
              />
            </div>
          </div>

          {/* Question main card block */}
          <div className="bg-white rounded-3xl p-6 md:p-8 border border-green-100 shadow-xl shadow-green-800/[0.03] text-center mb-6 relative overflow-hidden">
            <div className="absolute top-0 right-0 p-3 opacity-5 select-none text-9xl pointer-events-none">
              🌿
            </div>

            <div className="text-6xl mb-4 select-none">
              {question.emoji}
            </div>

            <p className="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-2">
              {question.category}
            </p>
            <h2 className="text-xl md:text-2xl font-bold text-slate-800 leading-relaxed">
              {question.question}
            </h2>
          </div>

          {/* Options Grid (Values of CO2 are invisible inside the list to avoid bias) */}
          <div className="space-y-3">
            {question.options.map((option, idx) => (
              <button
                key={idx}
                onClick={() => onAnswer(option.co2)}
                className="w-full text-left p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-emerald-500/50 hover:bg-emerald-50/20 shadow-sm transition-all duration-300 group active:scale-[0.99] flex items-center gap-3.5"
              >
                <span className="text-3xl bg-slate-100 p-2 rounded-xl group-hover:scale-110 group-hover:bg-emerald-50 transition-all duration-300 select-none flex-shrink-0">
                  {option.emoji}
                </span>
                <span className="text-sm md:text-base font-medium text-slate-700 group-hover:text-emerald-900 transition-colors">
                  {option.text}
                </span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // SCREEN: CARBON SIMULATOR COMPONENT
    // ==========================================
    function CarbonSimulator() {
      const [selections, setSelections] = React.useState({});

      React.useEffect(() => {
        const initial = {};
        organizerQuestions.forEach(q => { initial[q.id] = q.options[0].co2; });
        attendeeQuestions.forEach(q => { initial[q.id] = q.options[0].co2; });
        setSelections(initial);
      }, []);

      const handleSelectOption = (qId, co2Value) => {
        setSelections(prev => ({ ...prev, [qId]: co2Value }));
      };

      const currentOrgCO2 = organizerQuestions.reduce((sum, q) => sum + (selections[q.id] || 0), 0);
      const currentAttCO2 = attendeeQuestions.reduce((sum, q) => sum + (selections[q.id] || 0), 0);
      const currentTotal = currentOrgCO2 + currentAttCO2;
      const maxTotal = maxOrganizerCO2 + maxAttendeeCO2;
      const simLevel = getLevel(currentTotal, maxTotal);
      const simPct = Math.round((currentTotal / maxTotal) * 100);

      return (
        <div className="bg-white rounded-3xl p-6 border border-emerald-100 shadow-xl space-y-6">
          <div className="text-center space-y-2">
            <h3 className="text-xl font-bold text-slate-800 flex items-center justify-center gap-2">
              <SvgSliders className="w-5 h-5 text-emerald-500" />
              Interactive Event Simulator
            </h3>
            <p className="text-sm text-slate-500">
              ทดลองปรับแต่งแนวทางการจัดงานและพฤติกรรมผู้เข้าร่วมเพื่อสแกนหาจุดลดคาร์บอนสูงสุดร่วมกัน!
            </p>
          </div>

          {/* Monitor Card */}
          <div className={`p-5 rounded-2xl text-center space-y-4 ${simLevel.bg}`}>
            <div>
              <span className="text-xs uppercase tracking-wider text-slate-400 font-bold">คาร์บอนที่ลดได้จริง</span>
              <div className="flex items-baseline justify-center gap-1.5 mt-1">
                <span className={`text-5xl font-black ${simLevel.textColor}`}>
                  {currentTotal.toFixed(1)}
                </span>
                <span className={`text-xl font-bold ${simLevel.textColor}`}>kg CO₂</span>
              </div>
              <span className="text-xs text-slate-400 block mt-1">เป้าหมายสูงสุดคือ {maxTotal.toFixed(1)} kg</span>
            </div>

            {/* Simulated bar progress */}
            <div className="h-3 bg-white/60 rounded-full overflow-hidden relative">
              <div
                className={`h-full bg-gradient-to-r ${simLevel.color} rounded-full transition-all duration-300`}
                style={{ width: `${simPct}%` }}
              />
            </div>
            <div className="flex justify-between items-center text-xs font-bold px-1">
              <span className={simLevel.textColor}>{simPct}% ของศักยภาพสูงสุด</span>
              <span className={`px-2 py-0.5 rounded-md text-[10px] uppercase font-bold text-white bg-gradient-to-r ${simLevel.color}`}>
                {simLevel.label.split(" ")[0]}
              </span>
            </div>
          </div>

          {/* Interactive Accordion Accordions */}
          <div className="space-y-4 max-h-[420px] overflow-y-auto pr-1">
            {/* Organizer Section */}
            <div className="space-y-3">
              <h4 className="text-xs font-black text-emerald-800 uppercase tracking-widest flex items-center gap-1.5 border-b border-emerald-50 pb-1.5">
                <span>🎪</span> มาตรการผู้จัดงาน (Organizer Measures)
              </h4>
              {organizerQuestions.map((q) => (
                <div key={q.id} className="bg-slate-50 p-3.5 rounded-2xl space-y-2.5 border border-slate-100">
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{q.emoji}</span>
                    <span className="text-sm font-bold text-slate-700">{q.category}</span>
                  </div>
                  <div className="grid grid-cols-3 gap-1.5">
                    {q.options.map((opt, oIdx) => {
                      const isSelected = selections[q.id] === opt.co2;
                      return (
                        <button
                          key={oIdx}
                          onClick={() => handleSelectOption(q.id, opt.co2)}
                          className={`p-2 rounded-xl text-center transition-all duration-200 border-2 text-[11px] flex flex-col items-center gap-1 justify-center min-h-[64px] ${
                            isSelected
                              ? "bg-emerald-600 text-white border-emerald-600 font-bold shadow-md shadow-emerald-600/10 scale-[1.03]"
                              : "bg-white border-slate-100 text-slate-600 hover:bg-slate-100/50"
                          }`}
                        >
                          <span className="text-base select-none">{opt.emoji}</span>
                          <span className="line-clamp-1 leading-tight">{opt.text.split(" (")[0]}</span>
                          <span className={`text-[10px] font-bold block ${isSelected ? "text-emerald-100" : "text-emerald-600"}`}>
                            {opt.co2 > 0 ? `-${opt.co2.toFixed(1)} kg` : "0.0 kg"}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>

            {/* Attendee Section */}
            <div className="space-y-3 pt-2">
              <h4 className="text-xs font-black text-sky-800 uppercase tracking-widest flex items-center gap-1.5 border-b border-sky-50 pb-1.5">
                <span>🙋</span> พฤติกรรมผู้ร่วมงาน (Attendee Actions)
              </h4>
              {attendeeQuestions.map((q) => (
                <div key={q.id} className="bg-slate-50 p-3.5 rounded-2xl space-y-2.5 border border-slate-100">
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{q.emoji}</span>
                    <span className="text-sm font-bold text-slate-700">{q.category}</span>
                  </div>
                  <div className="grid grid-cols-3 gap-1.5">
                    {q.options.map((opt, oIdx) => {
                      const isSelected = selections[q.id] === opt.co2;
                      return (
                        <button
                          key={oIdx}
                          onClick={() => handleSelectOption(q.id, opt.co2)}
                          className={`p-2 rounded-xl text-center transition-all duration-200 border-2 text-[11px] flex flex-col items-center gap-1 justify-center min-h-[64px] ${
                            isSelected
                              ? "bg-sky-600 text-white border-sky-600 font-bold shadow-md shadow-sky-600/10 scale-[1.03]"
                              : "bg-white border-slate-100 text-slate-600 hover:bg-slate-100/50"
                          }`}
                        >
                          <span className="text-base select-none">{opt.emoji}</span>
                          <span className="line-clamp-1 leading-tight">{opt.text.split(" (")[0]}</span>
                          <span className={`text-[10px] font-bold block ${isSelected ? "text-sky-100" : "text-sky-600"}`}>
                            {opt.co2 > 0 ? `-${opt.co2.toFixed(1)} kg` : "0.0 kg"}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // SCREEN: RESULT & SCORES
    // ==========================================
    function ResultScreen({ organizerCO2, attendeeCO2, onRestart, onShowToast }) {
      const [activeTab, setActiveTab] = React.useState("summary");

      const totalCO2 = organizerCO2 + attendeeCO2;
      const maxCO2 = maxOrganizerCO2 + maxAttendeeCO2;
      const level = getLevel(totalCO2, maxCO2);
      const comparisons = getComparisons(totalCO2);
      const pct = Math.round((totalCO2 / maxCO2) * 100);

      const handleShare = () => {
        const text = `ฉันทำแบบทดสอบและช่วยลดคาร์บอน (CO₂) ได้ถึง ${totalCO2.toFixed(1)} kg! จากแบบทดสอบ Green Event 🌍\nระดับรักษ์โลกของฉัน: ${level.label}\n\nมาร่วมรักษ์โลกกันได้ที่ Green Event Quiz!`;
        
        try {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.style.position = "fixed"; 
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();
          const success = document.execCommand('copy');
          document.body.removeChild(textarea);
          
          if (success) {
            onShowToast("คัดลอกผลลัพธ์ลงในคลิปบอร์ดแล้ว! ส่งต่อให้เพื่อนๆ ได้เลย");
          } else {
            onShowToast("ไม่สามารถคัดลอกได้โดยอัตโนมัติ กรุณาลองใหม่อีกครั้ง");
          }
        } catch (err) {
          onShowToast("เกิดข้อผิดพลาดในการคัดลอก");
        }
      };

      return (
        <div className="w-full max-w-xl mx-auto px-4 py-4 animate-fade-in">
          {/* Summary / Simulator Tabs Navigation */}
          <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-6">
            <button
              onClick={() => setActiveTab("summary")}
              className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 flex items-center justify-center gap-1.5 ${
                activeTab === "summary" ? "bg-white shadow-md text-emerald-800" : "text-slate-500 hover:text-slate-800"
              }`}
            >
              <SvgAward className="w-4 h-4 text-emerald-500" />
              สรุปคะแนนรักษ์โลก
            </button>
            <button
              onClick={() => setActiveTab("simulator")}
              className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 flex items-center justify-center gap-1.5 ${
                activeTab === "simulator" ? "bg-white shadow-md text-emerald-800" : "text-slate-500 hover:text-slate-800"
              }`}
            >
              <SvgSliders className="w-4 h-4 text-emerald-500" />
              จำลองแผนคาร์บอน
            </button>
          </div>

          {activeTab === "summary" ? (
            <div className="space-y-6">
              {/* Level Badge Circle */}
              <div className="text-center">
                <div className={`inline-flex w-32 h-32 rounded-full bg-gradient-to-br ${level.color} items-center justify-center shadow-2xl mx-auto`}>
                  <span className="text-6xl">{level.label.split(" ")[0]}</span>
                </div>
                <h2 className="text-2xl font-black text-slate-800 mt-4">
                  {level.label.slice(2)}
                </h2>
                <p className="text-xs text-slate-400 mt-1">ระดับความเป็นมิตรต่อสิ่งแวดล้อมของคุณ</p>
              </div>

              {/* Carbon counter panel card */}
              <div className={`${level.bg} rounded-3xl p-6 text-center shadow-lg`}>
                <p className="text-sm font-semibold text-slate-500 mb-1">คุณมีส่วนช่วยลดการปล่อยคาร์บอน CO₂ ได้สะสม</p>
                <div className="flex items-end justify-center gap-2 mb-2">
                  <span className={`text-6xl font-black ${level.textColor}`}>
                    {totalCO2.toFixed(1)}
                  </span>
                  <span className={`text-2xl font-bold ${level.textColor} mb-2`}>kg</span>
                </div>
                <p className="text-xs text-slate-400 mb-4">จากยอดคาร์บอนที่เป็นไปได้ทั้งหมด {maxCO2.toFixed(1)} kg</p>

                {/* Progress meter */}
                <div className="h-3.5 bg-white/70 rounded-full overflow-hidden mb-2 shadow-inner border border-slate-100">
                  <div
                    className={`h-full bg-gradient-to-r ${level.color} rounded-full transition-all duration-1000 ease-out`}
                    style={{ width: `${pct}%` }}
                  />
                </div>
                <p className={`text-sm font-bold ${level.textColor}`}>
                  {pct}% ของศักยภาพสูงสุดในแคมเปญสีเขียวนี้
                </p>

                {/* Evaluated descriptions */}
                <div className="mt-4 pt-3 border-t border-slate-200/40 text-left">
                  <p className="text-xs leading-relaxed text-slate-600 font-medium">
                    💡 <strong>ประเมินผล:</strong> {level.desc}
                  </p>
                </div>
              </div>

              {/* Role breakdown grid */}
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-white border border-slate-100 rounded-2xl p-4 text-center shadow-sm">
                  <div className="text-3xl mb-1 select-none">🎪</div>
                  <p className="text-xs text-slate-400 font-bold mb-1">ฝั่งผู้จัดงาน</p>
                  <p className="text-2xl font-black text-emerald-600">{organizerCO2.toFixed(1)}</p>
                  <p className="text-[10px] text-slate-400">kg CO₂ ที่ประหยัดได้</p>
                </div>
                <div className="bg-white border border-slate-100 rounded-2xl p-4 text-center shadow-sm">
                  <div className="text-3xl mb-1 select-none">🙋</div>
                  <p className="text-xs text-slate-400 font-bold mb-1">ฝั่งผู้ร่วมงาน</p>
                  <p className="text-2xl font-black text-teal-600">{attendeeCO2.toFixed(1)}</p>
                  <p className="text-[10px] text-slate-400">kg CO₂ ที่ประหยัดได้</p>
                </div>
              </div>

              {/* Comparisons card block */}
              <div className="bg-white rounded-3xl border border-slate-100 p-5 shadow-sm">
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-1.5">
                  <SvgActivity className="w-4 h-4 text-emerald-500" />
                  เปรียบเทียบผลลัพธ์เชิงนิเวศน์ (Eco-Equivalent)
                </h3>
                <div className="space-y-4">
                  {comparisons.map((c, i) => (
                    <div key={i} className="flex items-start gap-3.5">
                      <span className="text-3xl bg-slate-50 p-2 rounded-xl select-none">{c.emoji}</span>
                      <div className="space-y-0.5">
                        <p className="text-sm md:text-base font-bold text-slate-800 leading-snug">
                          {c.label}
                        </p>
                        <p className="text-xs text-slate-400">{c.sub}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Control Action buttons */}
              <div className="flex flex-col sm:flex-row gap-3 pt-2">
                <button
                  onClick={handleShare}
                  className="flex-1 inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all duration-300 active:scale-95"
                >
                  <SvgShare className="w-5 h-5" />
                  แชร์และบอกต่อความรักษ์โลก
                </button>
                <button
                  onClick={onRestart}
                  className="flex-1 inline-flex items-center justify-center gap-2 border-2 border-slate-200 bg-white hover:bg-slate-50 text-slate-700 font-bold py-4 rounded-2xl shadow-sm transition-all duration-300 active:scale-95"
                >
                  <SvgRotateCcw className="w-5 h-5 text-slate-500" />
                  เริ่มคำนวณใหม่อีกครั้ง
                </button>
              </div>
            </div>
          ) : (
            <CarbonSimulator />
          )}
        </div>
      );
    }

    // ==========================================
    // PRIMARY APP ROOT (App)
    // ==========================================
    function App() {
      const [stage, setStage] = React.useState("home");
      const [currentQ, setCurrentQ] = React.useState(0);
      const [organizerCO2, setOrganizerCO2] = React.useState(0);
      const [attendeeCO2, setAttendeeCO2] = React.useState(0);
      const [toastMessage, setToastMessage] = React.useState("");

      const handleAnswer = (co2) => {
        const q = allQuestions[currentQ];
        const isOrganizerQ = organizerQuestions.some((oq) => oq.id === q.id);

        if (isOrganizerQ) {
          setOrganizerCO2((prev) => prev + co2);
        } else {
          setAttendeeCO2((prev) => prev + co2);
        }

        if (currentQ + 1 < allQuestions.length) {
          setCurrentQ(currentQ + 1);
        } else {
          setStage("result");
        }
      };

      const handleRestart = () => {
        setStage("home");
        setCurrentQ(0);
        setOrganizerCO2(0);
        setAttendeeCO2(0);
      };

      return (
        <div className="min-h-screen relative bg-slate-50 text-slate-800 pb-16 pt-6">
          {/* Dynamic Background Soft Blobs */}
          <div className="fixed inset-0 pointer-events-none z-0">
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-[800px] h-[500px] bg-gradient-to-b from-emerald-500/[0.08] via-transparent to-transparent rounded-full blur-3xl" />
            <div className="absolute bottom-0 right-0 w-[350px] h-[350px] bg-gradient-to-tl from-emerald-400/[0.06] via-transparent to-transparent rounded-full blur-2xl" />
          </div>

          <div className="relative z-10 max-w-2xl mx-auto px-4">
            {/* Header Navbar */}
            <div className="flex items-center justify-between mb-4 border-b border-emerald-50 pb-4">
              <div className="flex items-center gap-2 cursor-pointer select-none" onClick={handleRestart}>
                <span className="text-2xl">🌍</span>
                <span className="font-black text-lg tracking-wide text-emerald-800">
                  EcoEvent
                </span>
              </div>
              <span className="text-xs bg-emerald-50 border border-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold">
                Carbon Counter v1.2
              </span>
            </div>

            {/* Stages Switch blocks */}
            {stage === "home" && (
              <HomeScreen onStart={() => setStage("quiz")} />
            )}
            
            {stage === "quiz" && (
              <EventQuestionCard
                question={allQuestions[currentQ]}
                questionIndex={currentQ}
                totalQuestions={allQuestions.length}
                onAnswer={handleAnswer}
              />
            )}
            
            {stage === "result" && (
              <ResultScreen
                organizerCO2={organizerCO2}
                attendeeCO2={attendeeCO2}
                onRestart={handleRestart}
                onShowToast={(msg) => setToastMessage(msg)}
              />
            )}

            {/* Toast rendering */}
            {toastMessage && (
              <Toast
                message={toastMessage}
                onClose={() => setToastMessage("")}
              />
            )}
          </div>
        </div>
      );
    }

    // Render App inside the DOM
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
